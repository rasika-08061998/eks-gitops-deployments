apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/rasika-08061998/eks-gitops-deployments
    targetRevision: HEAD
    path: frontend

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true