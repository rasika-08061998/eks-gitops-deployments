containers:
  - name: postgres
    image: postgres:15
    ports:
      - containerPort: 5432

    env:
      - name: POSTGRES_DB
        value: appdb
      - name: POSTGRES_USER
        value: postgres
      - name: POSTGRES_PASSWORD
        value: postgres
      - name: PGDATA
        value: /var/lib/postgresql/data/pgdata

    volumeMounts:
      - name: postgres-storage
        mountPath: /var/lib/postgresql/data